name: "test"
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - main
      - "releases/*"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: disable auto CRLF
        run: git config --global core.autoCRLF false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: "npm"
      - run: npm ci
      - run: npm test

  check-permission:
    name: check permission
    runs-on: ubuntu-latest
    outputs:
      permission: ${{ steps.check.outputs.permission }}
    steps:
      - id: check
        uses: shogo82148/actions-check-permissions@b7c32c43a066d5752565f554c15c9ac4d6d63e3b # v1.0.4
      - name: the result
        run: echo ${{ steps.check.outputs.permission }}

  integrated:
    name: integrated test
    runs-on: ubuntu-latest
    needs:
      - check-permission
    if: needs.check-permission.outputs.permission == 'write'
    outputs:
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Release
        id: create_release
        uses: shogo82148/actions-create-release@559c27ce7eb834825e2b55927c64f6d1bd1db716 # v1.8.1
        with:
          tag_name: test-${{ github.run_id }}
          release_name: Test for ${{ github.run_id }}
          prerelease: true
          body: |
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: upload
        uses: ./
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: lib/*.js

      - name: overwrite
        uses: ./
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: lib/*.js
          overwrite: true

  cleanup:
    if: always()
    name: cleanup
    runs-on: ubuntu-latest
    needs:
      - integrated
    steps:
      - name: cleanup
        run: |
          gh api -X DELETE -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"
          sleep 5 # it takes a moment to delete the release
          gh api -X DELETE -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/refs/tags/test-$GITHUB_RUN_ID"
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.integrated.outputs.id }}
